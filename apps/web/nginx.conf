server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker must not be cached — browsers re-check it on every load.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Workbox runtime files — Vite hashes them so long cache is safe.
    location /workbox- {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Hashed JS/CSS bundles.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Icons and manifest — short-lived so updates propagate quickly.
    location /icons/ {
        add_header Cache-Control "public, max-age=86400";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";
        default_type application/manifest+json;
    }

    # SPA fallback: every unknown path serves index.html so the React router
    # (if ever added) or the single-page app can handle navigation client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
